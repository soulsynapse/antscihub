project:
  type: website
  output-dir: _site

website:
  title: "AntSciHub"
  description: "Lab Notebooks & Research"
  favicon: favicon.png  # drop a .png in the project root
  repo-url: https://github.com/soulsynapse/antscihub
  repo-branch: main
  repo-actions: [edit, issue, source]

  # Navigation
  page-navigation: true       # prev/next links at bottom of pages
  back-to-top-navigation: false
  bread-crumbs: false            # show page hierarchy in the header

  sidebar:
    style: docked
    search: true               # search bar in the sidebar
    tools:
      - icon: github
        href: https://github.com/soulsynapse
        text: GitHub
        aria-label: GitHub profile
    collapse-level: 2          # auto-collapse deeper sections
    contents:
      - section: "Lab Notebooks"
        contents: lab-notebooks/*.qmd
      - section: "Templates"
        contents:
          - "Templates/Research Project Components/Research Project Template.qmd"

  # Footer
  page-footer:
    center: "© 2026 Kendrick Nakamura"

  # Search options
  search:
    location: sidebar
    type: textbox              # search entry bar in the sidebar

format:
  html:
    theme:
      light: cosmo
      dark: darkly             # gives you a light/dark toggle for free
    css: styles.css
    toc: true
    toc-depth: 3
    toc-expand: 1              # show main ToC sections; expand the active branch while scrolling
    toc-location: right

    # Wider body (default is 700px)
    grid:
      sidebar-width: 190px
      body-width: 950px
      margin-width: 250px

    # Code
    code-fold: true            # collapse code blocks by default, click to expand
    code-summary: "Show code"
    code-tools: false          # hide the global code tools menu
    code-copy: true            # copy button on code blocks
    code-overflow: scroll      # horizontal scroll instead of wrapping
    highlight-style: github

    # Figures
    lightbox: true             # click-to-zoom on figures
    fig-cap-location: bottom

    # Math — KaTeX is much faster than MathJax
    html-math-method: katex

    # Polish
    smooth-scroll: true
    anchor-sections: true      # hover on heading → anchor link
    link-external-newwindow: true

execute:
  # Don't re-execute notebooks unless their source changes.
  # Critical when you have long-running CV or simulation code.
  # Run `quarto render --execute` to force a full re-run.
  freeze: auto

  # Sensible defaults for computational notebooks
  warning: false
  message: false
